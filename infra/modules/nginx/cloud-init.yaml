#cloud-config
package_update: true
package_upgrade: true
packages:
  - ufw
  - fail2ban
  - nginx
  - libnginx-mod-stream
  - nfs-kernel-server

device_aliases:
  app_data: /dev/vdb

disk_setup:
  app_data:
    layout: true
    overwrite: false
    table_type: gpt

fs_setup:
  - device: app_data
    label: application_data
    filesystem: ext4
    overwrite: false

mounts:
  - [app_data, /srv/shared, "auto", "defaults", "0", "2"]

users:
  - name: ${server_username}
    lock_passwd: true
    shell: /bin/bash
    ssh-authorized-keys:
      - ${public_ssh_key}
    sudo:
      - ALL=(ALL) NOPASSWD:ALL

write_files:
  - path: /etc/exports
    content: /srv/shared ${internal_subnet_cidr}(rw,sync,no_subtree_check)
    append: true

  - path: /etc/nginx/stream.conf.d/neo4j-bolt.conf
    content: |
      server {
          listen 7687;
          proxy_pass ${neo4j_internal_ip}:7687;
      }

  - path: /etc/nginx/nginx.conf
    content: |
      include /etc/nginx/modules-enabled/*.conf;

      worker_processes 1;

      events {
          worker_connections 1024;
      }

      http {
          include      mime.types;
          default_type application/octet-stream;
          sendfile     on;
          keepalive_timeout 65;

          server {
              listen      80;
              server_name localhost;

              location / {
                  root  html;
                  index index.html index.htm;
              }

              error_page  500 502 503 504 /50x.html;
              location = /50x.html {
                  root html;
              }
          }

          include /etc/nginx/sites-enabled/*;
      }

  - path: /etc/nginx/sites-available/neo4j
    content: |
      server {
          listen 7474;

          location / {
              proxy_pass http://${neo4j_internal_ip}:7474;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          }
      }

  - path: /etc/ssh/sshd_config
    content: |
      Port 22
      Protocol 2
      HostKey /etc/ssh/ssh_host_rsa_key
      HostKey /etc/ssh/ssh_host_ecdsa_key
      HostKey /etc/ssh/ssh_host_ed25519_key
      SyslogFacility AUTH
      LogLevel INFO
      LoginGraceTime 120
      PermitRootLogin no
      PermitEmptyPasswords no
      PermitUserEnvironment yes
      PasswordAuthentication no
      StrictModes yes
      DebianBanner no
      PubkeyAuthentication yes
      IgnoreRhosts yes
      HostbasedAuthentication no
      ChallengeResponseAuthentication no
      X11Forwarding no
      PrintMotd no
      PrintLastLog yes
      TCPKeepAlive yes
      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server
      UsePAM yes
      MaxAuthTries 3
      MaxStartups 2:30:10
      AllowAgentForwarding no
      AllowUsers ${server_username}

runcmd:
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp comment 'SSH'
  - ufw allow 80/tcp comment 'HTTP'
  - ufw allow 443/tcp comment 'HTTPS'
  - ufw allow 7474/tcp comment 'Neo4j Browser'
  - ufw allow 7687/tcp comment 'Neo4j Bolt'
  - ufw allow proto tcp from ${internal_subnet_cidr} to any port 2049 comment 'NFS'
  - ufw enable
  - chown -R ${server_username}:${server_username} /srv/shared
  - systemctl enable nfs-kernel-server
  - systemctl start nfs-kernel-server
  - exportfs -a
  - systemctl enable nginx
  - systemctl start nginx
  - echo "stream { include /etc/nginx/stream.conf.d/*.conf; }" >> /etc/nginx/nginx.conf
  - ln -s /etc/nginx/sites-available/neo4j /etc/nginx/sites-enabled/neo4j
  - systemctl reload nginx
